apiVersion: batch/v1
kind: Job
metadata:
  name: rag-ingest
  namespace: rag-agent
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: rag-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "pipeline/ingest.py"]
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
