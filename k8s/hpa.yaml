apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-app
  namespace: rag-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
